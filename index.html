<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SpendWell</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="brand">
      <div class="logo serif">S</div>
      <div><h1 class="serif">SpendWell</h1><p id="syncStatus">Budgets &amp; spending, beautifully tracked</p></div>
    </div>
    <div class="controls" id="controls"></div>
  </div>
  <div id="app"></div>
</div>
<input id="csvInput" type="file" accept=".csv,text/csv" style="display:none" />
<input id="restoreInput" type="file" accept=".json,application/json" style="display:none" />
<div id="modalRoot"></div>
<div id="toastRoot"></div>
<div id="lockRoot"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" integrity="sha384-JUh163oCRItcbPme8pYnROHQMC6fNKTBWtRG3I3I0erJkzNgL7uxKlNwcrcFKeqF" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js" integrity="sha384-D/t0ZMqQW31H3az8ktEiNb39wyKnS82iFY52QPACM+IjKW3jDUhyIgh2PApRqJZs" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.1/dist/umd/supabase.js" integrity="sha384-EjUdIVmzWliPzdzhxZ9ZoO0etXLKWuUPUftAGxP6qH6Lm4oLwoLaJR0Ba4pIDiDL" crossorigin="anonymous"></script>
<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
</body>
</html>
